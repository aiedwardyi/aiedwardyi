<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Edward Yi cinematic poster profile hero</title>
  <desc id="desc">A cinematic poster style hero with generative lighting, motion, and bold typography.</desc>
  <style>
    text { font-family: "Segoe UI", Arial, sans-serif; }
    .driftA { animation: driftA 14s ease-in-out infinite; transform-origin: center; }
    .driftB { animation: driftB 18s ease-in-out infinite; transform-origin: center; }
    .shimmer { animation: shimmer 5s ease-in-out infinite; }
    .beam { animation: beam 7s ease-in-out infinite; }
    @keyframes driftA {
      0%, 100% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(-10px) translateX(6px); }
    }
    @keyframes driftB {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.9; }
      50% { transform: translateY(8px) scale(1.03); opacity: 1; }
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.18; }
      50% { opacity: 0.46; }
    }
    @keyframes beam {
      0%, 100% { opacity: 0.25; transform: translateX(0); }
      50% { opacity: 0.55; transform: translateX(18px); }
    }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05070D"/>
      <stop offset="0.52" stop-color="#08101E"/>
      <stop offset="1" stop-color="#081523"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8FD3FF"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <radialGradient id="moon" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(912 198) rotate(90) scale(220 220)">
      <stop stop-color="#93C5FD" stop-opacity="0.92"/>
      <stop offset="0.4" stop-color="#38BDF8" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(828 314) rotate(90) scale(190 320)">
      <stop stop-color="#1D4ED8" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#1D4ED8" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>

  <rect width="1200" height="520" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="520" rx="34" fill="url(#core)"/>

  <g opacity="0.08">
    <path d="M138 0V520" stroke="#22324A"/>
    <path d="M718 0V520" stroke="#22324A"/>
    <path d="M0 398H1200" stroke="#22324A"/>
  </g>

  <g class="driftA">
    <circle cx="920" cy="186" r="152" fill="url(#moon)"/>
    <circle cx="920" cy="186" r="96" stroke="#60A5FA" stroke-opacity="0.24"/>
    <circle cx="920" cy="186" r="128" stroke="#60A5FA" stroke-opacity="0.14"/>
  </g>

  <g class="beam">
    <path d="M684 324L1178 144" stroke="url(#line)" stroke-opacity="0.55" stroke-width="2"/>
    <path d="M694 366L1160 248" stroke="#60A5FA" stroke-opacity="0.3" stroke-width="1.5"/>
    <path d="M658 284L1130 86" stroke="#DBEAFE" stroke-opacity="0.22" stroke-width="1.5"/>
  </g>

  <g class="driftB">
    <path d="M756 420C806 352 884 320 978 314C1048 309 1112 330 1160 376" stroke="#7DD3FC" stroke-opacity="0.5" stroke-width="2.5"/>
    <path d="M710 452C776 386 848 356 948 350C1032 344 1106 368 1162 420" stroke="#38BDF8" stroke-opacity="0.24" stroke-width="2"/>
  </g>

  <circle cx="802" cy="317" r="6" fill="#DBF5FF"/>
  <circle cx="996" cy="307" r="7" fill="#38BDF8"/>
  <circle class="shimmer" cx="1090" cy="360" r="6" fill="#93C5FD"/>

  <text x="60" y="68" fill="#8CB7D8" font-size="15" font-weight="700" letter-spacing="2.8">AIEDWARDYI / POSTER STUDY</text>
  <text x="60" y="158" fill="#F8FBFF" font-size="88" font-weight="700">Edward Yi</text>
  <text x="60" y="214" fill="#94A3B8" font-size="20" font-weight="600" letter-spacing="1.8">AI ENGINEER / FOUNDER / SEOUL</text>
  <text x="60" y="294" fill="#F8FBFF" font-size="44" font-weight="650">Building systems where</text>
  <text x="60" y="344" fill="#F8FBFF" font-size="44" font-weight="650">Agents do real work</text>
  <text x="60" y="402" fill="#CBD5E1" font-size="20" font-weight="600">AI Systems / Developer Tools / MedTech AI</text>
  <text x="60" y="442" fill="#60A5FA" font-size="20" font-weight="700">2.8k+ yearly contributions / 37-day streak / 200+ shipped products</text>

  <text x="868" y="118" fill="#132339" font-size="138" font-weight="700">AI</text>
  <rect x="58" y="470" width="210" height="6" rx="3" fill="url(#line)"/>

  <circle cx="998" cy="170" r="166" fill="#38BDF8" fill-opacity="0.06" filter="url(#softBlur)"/>
  <rect x="0.5" y="0.5" width="1199" height="519" rx="33.5" stroke="#1A2C42"/>
</svg>
