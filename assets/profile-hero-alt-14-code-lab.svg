<svg width="1200" height="460" viewBox="0 0 1200 460" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Edward Yi code lab profile hero</title>
  <desc id="desc">A polished editor and terminal lab inspired profile hero with subtle animation.</desc>
  <style>
    text { font-family: Consolas, "SFMono-Regular", monospace; }
    .ui { font-family: "Segoe UI", Arial, sans-serif; }
    .cursor { animation: blink 1s steps(1, end) infinite; }
    .pulse { animation: pulse 3.8s ease-in-out infinite; transform-origin: center; }
    .rise { animation: rise 6s ease-in-out infinite; transform-origin: center; }
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.45; }
      50% { opacity: 1; }
    }
    @keyframes rise {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#04070E"/>
      <stop offset="0.58" stop-color="#0A1120"/>
      <stop offset="1" stop-color="#0B1828"/>
    </linearGradient>
    <linearGradient id="editor" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#0E1A2C"/>
      <stop offset="1" stop-color="#0A1321"/>
    </linearGradient>
    <linearGradient id="terminal" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0C1727"/>
      <stop offset="1" stop-color="#0F2034"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#67E8F9"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(918 292) rotate(90) scale(188 240)">
      <stop stop-color="#22D3EE" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="460" rx="32" fill="url(#bg)"/>
  <rect width="1200" height="460" rx="32" fill="url(#glow)"/>

  <g opacity="0.1">
    <path d="M0 66H1200" stroke="#24344D"/>
    <path d="M602 66V428" stroke="#24344D"/>
  </g>

  <circle cx="44" cy="34" r="8" fill="#F87171"/>
  <circle cx="70" cy="34" r="8" fill="#FBBF24"/>
  <circle cx="96" cy="34" r="8" fill="#34D399"/>
  <text x="126" y="39" fill="#95A9C2" font-size="14" class="ui" font-weight="700" letter-spacing="1.8">edward-profile.tsx</text>

  <rect x="34" y="94" width="534" height="324" rx="24" fill="url(#editor)" stroke="#1B2E46"/>
  <text x="60" y="132" fill="#95A9C2" font-size="16" class="ui" font-weight="700">builder.ts</text>

  <text x="68" y="174" fill="#60A5FA" font-size="24">const</text>
  <text x="142" y="174" fill="#E2E8F0" font-size="24">edward</text>
  <text x="244" y="174" fill="#94A3B8" font-size="24">=</text>
  <text x="274" y="174" fill="#C084FC" font-size="24">{</text>

  <text x="92" y="212" fill="#7DD3FC" font-size="23">role</text>
  <text x="146" y="212" fill="#94A3B8" font-size="23">:</text>
  <text x="166" y="212" fill="#FDE68A" font-size="23">"AI Engineer / Founder"</text>

  <text x="92" y="248" fill="#7DD3FC" font-size="23">focus</text>
  <text x="156" y="248" fill="#94A3B8" font-size="23">:</text>
  <text x="176" y="248" fill="#C084FC" font-size="23">["agents", "devtools", "medtech"]</text>

  <text x="92" y="284" fill="#7DD3FC" font-size="23">stack</text>
  <text x="156" y="284" fill="#94A3B8" font-size="23">:</text>
  <text x="176" y="284" fill="#C084FC" font-size="23">["Python", "TypeScript", "React"]</text>

  <text x="92" y="320" fill="#7DD3FC" font-size="23">signal</text>
  <text x="166" y="320" fill="#94A3B8" font-size="23">:</text>
  <text x="186" y="320" fill="#FDE68A" font-size="22">"building systems where"</text>
  <text x="186" y="350" fill="#FDE68A" font-size="22">"agents do real work"</text>

  <text x="92" y="384" fill="#7DD3FC" font-size="23">shipped</text>
  <text x="176" y="384" fill="#94A3B8" font-size="23">:</text>
  <text x="196" y="384" fill="#C084FC" font-size="23">"90+ dev org / 200+ products"</text>

  <text x="68" y="408" fill="#C084FC" font-size="24">}</text>
  <rect class="cursor" x="92" y="390" width="12" height="24" rx="2" fill="#67E8F9"/>

  <rect x="634" y="94" width="532" height="324" rx="24" fill="url(#terminal)" stroke="#1B2E46"/>
  <text x="660" y="132" fill="#95A9C2" font-size="16" class="ui" font-weight="700">operator.console</text>

  <rect x="660" y="162" width="482" height="104" rx="18" fill="#08111D" stroke="#233A57"/>
  <text x="684" y="194" fill="#67E8F9" font-size="21">&gt; deploy summary</text>
  <text x="684" y="228" fill="#E2E8F0" font-size="21">contributions: <tspan fill="#7DD3FC" font-weight="700">2,876</tspan></text>
  <text x="684" y="256" fill="#E2E8F0" font-size="21">current streak: <tspan fill="#7DD3FC" font-weight="700">37 days</tspan></text>

  <rect x="660" y="286" width="226" height="94" rx="18" fill="#08111D" stroke="#233A57"/>
  <rect x="916" y="286" width="226" height="94" rx="18" fill="#08111D" stroke="#233A57"/>
  <text x="684" y="318" fill="#95A9C2" font-size="16" class="ui" font-weight="700">SHIPPING</text>
  <text x="684" y="352" fill="#F8FBFF" font-size="34" class="ui" font-weight="700">200+</text>
  <text x="772" y="352" fill="#7DD3FC" font-size="18" class="ui" font-weight="700">products</text>

  <text x="940" y="318" fill="#95A9C2" font-size="16" class="ui" font-weight="700">SCALE</text>
  <text x="940" y="352" fill="#F8FBFF" font-size="34" class="ui" font-weight="700">90+</text>
  <text x="1008" y="352" fill="#7DD3FC" font-size="18" class="ui" font-weight="700">dev org</text>

  <g class="rise">
    <rect x="1004" y="170" width="12" height="68" rx="6" fill="url(#accent)"/>
    <rect x="1028" y="190" width="12" height="48" rx="6" fill="url(#accent)" opacity="0.75"/>
    <rect x="1052" y="144" width="12" height="94" rx="6" fill="url(#accent)" opacity="0.92"/>
    <rect x="1076" y="178" width="12" height="60" rx="6" fill="url(#accent)" opacity="0.66"/>
  </g>

  <circle class="pulse" cx="1124" cy="116" r="6" fill="#67E8F9"/>
  <rect x="34" y="430" width="180" height="8" rx="4" fill="url(#accent)"/>
  <text x="232" y="437" fill="#95A9C2" font-size="15" class="ui" font-weight="700">AIEDWARDYI / CODE LAB</text>

  <rect x="0.5" y="0.5" width="1199" height="459" rx="31.5" stroke="#1A2C42"/>
</svg>
