<svg width="1200" height="340" viewBox="0 0 1200 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Edward Yi editorial grid profile hero</title>
  <desc id="desc">An editorial black and white profile hero with bold type and a green accent.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0A0A"/>
      <stop offset="0.52" stop-color="#111111"/>
      <stop offset="1" stop-color="#171717"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#A3E635"/>
      <stop offset="1" stop-color="#4ADE80"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1200" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A3E635" stop-opacity="0.26"/>
      <stop offset="0.5" stop-color="#A3E635" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#4ADE80" stop-opacity="0.16"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="340" rx="28" fill="url(#bg)"/>

  <g opacity="0.10">
    <path d="M224 0V340" stroke="#404040"/>
    <path d="M734 0V340" stroke="#404040"/>
    <path d="M0 228H1200" stroke="#404040"/>
  </g>

  <text x="46" y="62" fill="#A3E635" font-size="15" font-weight="700" letter-spacing="2.4" font-family="Segoe UI, Arial, sans-serif">SEOUL / 2026</text>
  <rect x="46" y="82" width="92" height="6" rx="3" fill="url(#accent)"/>

  <text x="44" y="170" fill="#FAFAFA" font-size="82" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Edward</text>
  <text x="44" y="240" fill="#FAFAFA" font-size="82" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Yi</text>

  <text x="366" y="110" fill="#A3A3A3" font-size="16" font-weight="700" letter-spacing="2" font-family="Segoe UI, Arial, sans-serif">AI ENGINEER / FOUNDER</text>
  <text x="366" y="162" fill="#FAFAFA" font-size="32" font-weight="650" font-family="Segoe UI, Arial, sans-serif">Building systems where</text>
  <text x="366" y="198" fill="#FAFAFA" font-size="32" font-weight="650" font-family="Segoe UI, Arial, sans-serif">Agents do real work</text>
  <text x="366" y="250" fill="#D4D4D4" font-size="19" font-weight="600" font-family="Segoe UI, Arial, sans-serif">Multi-Agent Systems / Developer Tools / Medical AI</text>
  <text x="366" y="290" fill="#A3E635" font-size="19" font-weight="600" font-family="Segoe UI, Arial, sans-serif">Python / TypeScript / React</text>

  <text x="776" y="118" fill="#262626" font-size="128" font-weight="700" font-family="Segoe UI, Arial, sans-serif">AI</text>
  <rect x="792" y="146" width="296" height="2" fill="#A3E635" fill-opacity="0.5"/>
  <text x="792" y="186" fill="#A3A3A3" font-size="18" font-weight="700" letter-spacing="1.8" font-family="Segoe UI, Arial, sans-serif">SHIPPING</text>
  <text x="792" y="218" fill="#FAFAFA" font-size="34" font-weight="650" font-family="Segoe UI, Arial, sans-serif">90+ dev org</text>
  <text x="792" y="258" fill="#FAFAFA" font-size="34" font-weight="650" font-family="Segoe UI, Arial, sans-serif">200+ products</text>

  <rect x="0.5" y="0.5" width="1199" height="339" rx="27.5" stroke="url(#border)"/>
</svg>
