<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Edward Yi orbit panel profile hero</title>
  <desc id="desc">A clean blue profile hero with a focused systems panel.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="0.58" stop-color="#111827"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(902 150) scale(250 180)">
      <stop stop-color="#60A5FA" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1060 214) scale(170 100)">
      <stop stop-color="#6EE7B7" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#6EE7B7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#6EE7B7"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60A5FA" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#60A5FA" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#6EE7B7" stop-opacity="0.18"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="300" rx="28" fill="url(#blueGlow)"/>
  <rect width="1200" height="300" rx="28" fill="url(#greenGlow)"/>

  <g opacity="0.10">
    <path d="M0 74H1200" stroke="#334155"/>
    <path d="M0 148H1200" stroke="#334155"/>
    <path d="M0 222H1200" stroke="#334155"/>
    <path d="M172 0V300" stroke="#334155"/>
    <path d="M344 0V300" stroke="#334155"/>
    <path d="M516 0V300" stroke="#334155"/>
    <path d="M688 0V300" stroke="#334155"/>
    <path d="M860 0V300" stroke="#334155"/>
    <path d="M1032 0V300" stroke="#334155"/>
  </g>

  <rect x="64" y="48" width="76" height="6" rx="3" fill="url(#accent)"/>
  <text x="64" y="112" fill="#F8FAFC" font-size="56" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Edward Yi</text>
  <text x="64" y="144" fill="#93C5FD" font-size="17" font-weight="700" letter-spacing="1.5" font-family="Segoe UI, Arial, sans-serif">AI ENGINEER / FOUNDER</text>
  <text x="64" y="196" fill="#FFFFFF" font-size="30" font-weight="650" font-family="Segoe UI, Arial, sans-serif">Building systems where</text>
  <text x="64" y="230" fill="#FFFFFF" font-size="30" font-weight="650" font-family="Segoe UI, Arial, sans-serif">Agents do real work</text>
  <text x="64" y="268" fill="#9CA3AF" font-size="17" font-weight="600" font-family="Segoe UI, Arial, sans-serif">Seoul  •  Python / TypeScript / React  •  Builder-Operator</text>

  <rect x="804" y="44" width="330" height="194" rx="24" fill="#0F172A" fill-opacity="0.76" stroke="#334155"/>
  <text x="830" y="76" fill="#93C5FD" font-size="15" font-weight="700" letter-spacing="1.6" font-family="Segoe UI, Arial, sans-serif">FOCUS</text>
  <rect x="830" y="88" width="64" height="4" rx="2" fill="url(#accent)"/>

  <rect x="830" y="110" width="278" height="34" rx="17" fill="#111827" stroke="#334155"/>
  <rect x="830" y="154" width="278" height="34" rx="17" fill="#111827" stroke="#334155"/>
  <rect x="830" y="198" width="278" height="34" rx="17" fill="#111827" stroke="#334155"/>

  <circle cx="854" cy="127" r="6" fill="#60A5FA"/>
  <circle cx="854" cy="171" r="6" fill="#6EE7B7"/>
  <circle cx="854" cy="215" r="6" fill="#93C5FD"/>

  <text x="874" y="132" fill="#F8FAFC" font-size="17" font-weight="600" font-family="Segoe UI, Arial, sans-serif">Agents</text>
  <text x="874" y="176" fill="#F8FAFC" font-size="17" font-weight="600" font-family="Segoe UI, Arial, sans-serif">DevTools</text>
  <text x="874" y="220" fill="#F8FAFC" font-size="17" font-weight="600" font-family="Segoe UI, Arial, sans-serif">MedTech</text>

  <text x="1068" y="132" fill="#64748B" font-size="13" font-weight="700" letter-spacing="1.2" font-family="Segoe UI, Arial, sans-serif">01</text>
  <text x="1066" y="176" fill="#64748B" font-size="13" font-weight="700" letter-spacing="1.2" font-family="Segoe UI, Arial, sans-serif">02</text>
  <text x="1066" y="220" fill="#64748B" font-size="13" font-weight="700" letter-spacing="1.2" font-family="Segoe UI, Arial, sans-serif">03</text>

  <rect x="0.5" y="0.5" width="1199" height="299" rx="27.5" stroke="url(#border)"/>
</svg>
