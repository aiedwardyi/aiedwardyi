<svg width="1200" height="340" viewBox="0 0 1200 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Edward Yi editorial grid profile hero</title>
  <desc id="desc">An editorial black and gold profile hero matched to edwardyi.dev.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08080A"/>
      <stop offset="0.52" stop-color="#0E0E10"/>
      <stop offset="1" stop-color="#151515"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#C9A84C"/>
      <stop offset="1" stop-color="#E2C87A"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1200" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C9A84C" stop-opacity="0.26"/>
      <stop offset="0.5" stop-color="#C9A84C" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#E2C87A" stop-opacity="0.16"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="340" rx="28" fill="url(#bg)"/>

  <g opacity="0.10">
    <path d="M224 0V340" stroke="#404040"/>
    <path d="M734 0V340" stroke="#404040"/>
    <path d="M0 228H1200" stroke="#404040"/>
  </g>

  <text x="46" y="62" fill="#C9A84C" font-size="15" font-weight="700" letter-spacing="2.4" font-family="Segoe UI, Arial, sans-serif">SEOUL / 2026</text>
  <rect x="46" y="82" width="92" height="6" rx="3" fill="url(#accent)"/>

  <text x="44" y="170" fill="#E8E8E8" font-size="82" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Edward</text>
  <text x="44" y="240" fill="#E8E8E8" font-size="82" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Yi</text>

  <text x="366" y="110" fill="#999999" font-size="16" font-weight="700" letter-spacing="2" font-family="Segoe UI, Arial, sans-serif">AI ENGINEER / FOUNDER</text>
  <text x="366" y="162" fill="#E8E8E8" font-size="32" font-weight="650" font-family="Segoe UI, Arial, sans-serif">Building systems where</text>
  <text x="366" y="198" fill="#E8E8E8" font-size="32" font-weight="650" font-family="Segoe UI, Arial, sans-serif">Agents do real work</text>
  <text x="366" y="250" fill="#CCCCCC" font-size="18" font-weight="600" font-family="Segoe UI, Arial, sans-serif">AI Systems / DevTools / MedTech AI</text>
  <text x="366" y="290" fill="#C9A84C" font-size="19" font-weight="600" font-family="Segoe UI, Arial, sans-serif">Python / TypeScript / React</text>

  <text x="808" y="118" fill="#1F1B12" font-size="128" font-weight="700" font-family="Segoe UI, Arial, sans-serif">AI</text>
  <rect x="824" y="146" width="272" height="2" fill="#C9A84C" fill-opacity="0.55"/>
  <text x="824" y="186" fill="#999999" font-size="18" font-weight="700" letter-spacing="1.8" font-family="Segoe UI, Arial, sans-serif">SHIPPING</text>
  <text x="824" y="218" fill="#E8E8E8" font-size="34" font-weight="650" font-family="Segoe UI, Arial, sans-serif">90+ dev org</text>
  <text x="824" y="258" fill="#E8E8E8" font-size="34" font-weight="650" font-family="Segoe UI, Arial, sans-serif">200+ products</text>

  <rect x="0.5" y="0.5" width="1199" height="339" rx="27.5" stroke="url(#border)"/>
</svg>
