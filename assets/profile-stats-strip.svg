<svg width="1200" height="210" viewBox="0 0 1200 210" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Edward Yi GitHub stats strip</title>
  <desc id="desc">A custom profile stats strip showing total contributions, current streak, and longest streak.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="1" stop-color="#0C1829"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="210" rx="26" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="209" rx="25.5" stroke="#1F334D"/>

  <g opacity="0.16">
    <line x1="400" y1="34" x2="400" y2="176" stroke="#36506D"/>
    <line x1="800" y1="34" x2="800" y2="176" stroke="#36506D"/>
  </g>

  <rect x="44" y="26" width="112" height="5" rx="2.5" fill="url(#accent)"/>

  <g transform="translate(200 0)">
    <text x="0" y="100" text-anchor="middle" fill="#58A6FF" font-size="52" font-weight="700" font-family="Segoe UI, Arial, sans-serif">2,921</text>
    <text x="0" y="136" text-anchor="middle" fill="#E5EEF8" font-size="24" font-weight="600" font-family="Segoe UI, Arial, sans-serif">Total Contributions</text>
    <text x="0" y="168" text-anchor="middle" fill="#8CA3BC" font-size="18" font-weight="500" font-family="Segoe UI, Arial, sans-serif">Jul 23, 2018 - Present</text>
  </g>

  <g transform="translate(600 0)">
    <circle cx="0" cy="86" r="52" fill="none" stroke="#55C2FF" stroke-width="7"/>
    <g transform="translate(0 12)">
      <path d="M1.5 0.67C1.5 0.67 2.24 3.32 2.24 5.47C2.24 7.53 0.89 9.2 -1.17 9.2C-3.23 9.2 -4.79 7.53 -4.79 5.47L-4.76 5.11C-6.78 7.51 -8 10.62 -8 13.99C-8 18.41 -4.42 22 0 22C4.42 22 8 18.41 8 13.99C8 8.6 5.41 3.79 1.5 0.67ZM-0.29 19C-2.07 19 -3.51 17.6 -3.51 15.86C-3.51 14.24 -2.46 13.1 -0.7 12.74C1.07 12.38 2.9 11.53 3.92 10.16C4.31 11.45 4.51 12.81 4.51 14.2C4.51 16.85 2.36 19 -0.29 19Z" fill="#55C2FF"/>
    </g>
    <text x="0" y="100" text-anchor="middle" fill="#F8FBFF" font-size="48" font-weight="700" font-family="Segoe UI, Arial, sans-serif">37</text>
    <text x="0" y="146" text-anchor="middle" fill="#55C2FF" font-size="24" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Current Streak</text>
    <text x="0" y="178" text-anchor="middle" fill="#8CA3BC" font-size="18" font-weight="500" font-family="Segoe UI, Arial, sans-serif">Feb 16 - Mar 24</text>
  </g>

  <g transform="translate(1000 0)">
    <text x="0" y="100" text-anchor="middle" fill="#58A6FF" font-size="52" font-weight="700" font-family="Segoe UI, Arial, sans-serif">37</text>
    <text x="0" y="136" text-anchor="middle" fill="#E5EEF8" font-size="24" font-weight="600" font-family="Segoe UI, Arial, sans-serif">Longest Streak</text>
    <text x="0" y="168" text-anchor="middle" fill="#8CA3BC" font-size="18" font-weight="500" font-family="Segoe UI, Arial, sans-serif">Feb 16 - Mar 24</text>
  </g>
