  <path class="line" d="M48.0,139.5 L112.9,105.8 L177.9,162.6 L242.8,149.1 L307.8,172.7 L372.7,167.8 L437.6,174.8 L502.6,163.7 L567.5,122.7 L632.5,127.6 L697.4,135.4 L762.4,124.0 L827.3,80.1 L892.2,110.5 L957.2,70.0 L1022.1,139.0 L1087.1,88.2 L1152.0,178.4"/>

