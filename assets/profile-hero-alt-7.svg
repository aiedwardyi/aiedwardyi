<svg width="1200" height="340" viewBox="0 0 1200 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Edward Yi signal beam profile hero</title>
  <desc id="desc">A warm signal-beam themed hero for a GitHub profile.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.52" stop-color="#111827"/>
      <stop offset="1" stop-color="#1F2937"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(970 182) rotate(180) scale(286 170)">
      <stop stop-color="#FB923C" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FB923C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#F97316"/>
      <stop offset="1" stop-color="#FDBA74"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1200" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FB923C" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#FB923C" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#FDE68A" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
  </defs>

  <rect width="1200" height="340" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="340" rx="28" fill="url(#glow)"/>

  <circle cx="1034" cy="108" r="82" fill="#FB923C" opacity="0.10" filter="url(#blur)"/>
  <circle cx="1110" cy="250" r="76" fill="#FDE68A" opacity="0.10" filter="url(#blur)"/>

  <rect x="64" y="62" width="86" height="6" rx="3" fill="url(#beam)"/>
  <text x="64" y="132" fill="#FFF7ED" font-size="60" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Edward Yi</text>
  <text x="64" y="164" fill="#FDBA74" font-size="18" font-weight="700" letter-spacing="1.5" font-family="Segoe UI, Arial, sans-serif">AI ENGINEER / FOUNDER</text>
  <text x="64" y="220" fill="#FFFFFF" font-size="34" font-weight="650" font-family="Segoe UI, Arial, sans-serif">building systems where</text>
  <text x="64" y="258" fill="#FFFFFF" font-size="34" font-weight="650" font-family="Segoe UI, Arial, sans-serif">agents do real work</text>
  <text x="64" y="304" fill="#FDBA74" font-size="18" font-weight="600" font-family="Segoe UI, Arial, sans-serif">Seoul  •  multi-agent systems  •  developer tools  •  medical AI</text>

  <rect x="726" y="48" width="410" height="244" rx="26" fill="#0B1220" fill-opacity="0.82" stroke="#2B3443"/>

