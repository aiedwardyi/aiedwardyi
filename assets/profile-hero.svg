  <rect x="976" y="220" width="100" height="36" rx="18" fill="#111827" stroke="#30363D"/>
  <text x="790" y="243" fill="#C9D1D9" font-size="16" font-weight="600" font-family="Segoe UI, Arial, sans-serif">agents</text>
  <text x="903" y="243" fill="#C9D1D9" font-size="16" font-weight="600" font-family="Segoe UI, Arial, sans-serif">tools</text>
