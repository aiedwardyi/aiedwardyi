<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Edward Yi profile hero</title>
  <desc id="desc">Static hero image for GitHub profile README.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1117"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(276 52) rotate(30.6) scale(536.915 255.348)">
      <stop stop-color="#58A6FF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1042 246) rotate(176.256) scale(268.278 148.511)">
      <stop stop-color="#7EE787" stop-opacity="0.11"/>
      <stop offset="1" stop-color="#7EE787" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#58A6FF"/>
      <stop offset="1" stop-color="#7EE787"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58A6FF" stop-opacity="0.26"/>
      <stop offset="0.5" stop-color="#58A6FF" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#7EE787" stop-opacity="0.16"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="44"/>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="24" fill="url(#glowBlue)"/>
  <rect width="1200" height="320" rx="24" fill="url(#glowGreen)"/>

  <rect x="58" y="48" width="72" height="6" rx="3" fill="url(#accent)"/>
  <text x="58" y="112" fill="#F0F6FC" font-size="60" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Edward Yi</text>
  <text x="58" y="144" fill="#8B949E" font-size="18" font-weight="600" letter-spacing="1.4" font-family="Segoe UI, Arial, sans-serif">AI ENGINEER / FOUNDER</text>

  <text x="58" y="198" fill="#F0F6FC" font-size="34" font-weight="650" font-family="Segoe UI, Arial, sans-serif">building systems where</text>
  <text x="58" y="236" fill="#F0F6FC" font-size="34" font-weight="650" font-family="Segoe UI, Arial, sans-serif">agents do real work</text>

  <text x="58" y="280" fill="#58A6FF" font-size="18" font-weight="600" font-family="Segoe UI, Arial, sans-serif">Seoul, South Korea</text>
  <text x="238" y="280" fill="#8B949E" font-size="18" font-weight="600" font-family="Segoe UI, Arial, sans-serif">• Python / TypeScript / React</text>

  <rect x="718" y="44" width="420" height="232" rx="24" fill="#0F172A" fill-opacity="0.72" stroke="#1F2937"/>

