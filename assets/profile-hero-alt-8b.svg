<svg width="1200" height="340" viewBox="0 0 1200 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Edward Yi orbit panel profile hero</title>
  <desc id="desc">A cool blue orbit-themed hero for a GitHub profile.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="0.58" stop-color="#111827"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(894 166) scale(260 190)">
      <stop stop-color="#60A5FA" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1048 246) scale(190 120)">
      <stop stop-color="#6EE7B7" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#6EE7B7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#6EE7B7"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1200" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60A5FA" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#60A5FA" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#6EE7B7" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="42"/>
    </filter>
  </defs>

  <rect width="1200" height="340" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="340" rx="28" fill="url(#blueGlow)"/>
  <rect width="1200" height="340" rx="28" fill="url(#greenGlow)"/>

  <g opacity="0.12">
    <path d="M0 78H1200" stroke="#334155"/>
    <path d="M0 146H1200" stroke="#334155"/>
    <path d="M0 214H1200" stroke="#334155"/>
    <path d="M0 282H1200" stroke="#334155"/>
