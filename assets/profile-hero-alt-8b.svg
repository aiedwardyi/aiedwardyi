  <rect x="66" y="58" width="78" height="6" rx="3" fill="url(#accent)"/>
  <text x="66" y="128" fill="#F8FAFC" font-size="60" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Edward Yi</text>
  <text x="66" y="162" fill="#93C5FD" font-size="18" font-weight="700" letter-spacing="1.5" font-family="Segoe UI, Arial, sans-serif">AI ENGINEER / FOUNDER</text>
  <text x="66" y="220" fill="#FFFFFF" font-size="34" font-weight="650" font-family="Segoe UI, Arial, sans-serif">Building systems where</text>
  <text x="66" y="258" fill="#FFFFFF" font-size="34" font-weight="650" font-family="Segoe UI, Arial, sans-serif">Agents do real work</text>
  <text x="66" y="302" fill="#9CA3AF" font-size="18" font-weight="600" font-family="Segoe UI, Arial, sans-serif">Seoul  •  Python / TypeScript / React  •  Builder-Operator</text>

