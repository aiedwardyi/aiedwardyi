  <text x="1041" y="234" fill="#F8FAFC" font-size="16" font-weight="600" font-family="Segoe UI, Arial, sans-serif">MedTech</text>

  <rect x="0.5" y="0.5" width="1199" height="339" rx="27.5" stroke="url(#border)"/>
